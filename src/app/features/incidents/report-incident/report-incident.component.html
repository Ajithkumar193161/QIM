<p-toast></p-toast>

<div class="p-2 md:p-4 bg-gray-100 min-h-screen">
    
    <p-card header="Report New Incident" 
            subheader="Enter the details of the quality deviation" 
            styleClass="w-full shadow-2 border-round-lg">
        
        <form [formGroup]="incidentForm" (ngSubmit)="onSubmit()" class="flex flex-column gap-4">
            
            <div class="flex flex-column gap-2">
                <label for="title" class="font-bold text-900">Incident Title</label>
                <input pInputText id="title" formControlName="title" 
                       placeholder="Brief summary of the issue" class="w-full p-inputtext-lg" />
            </div>

            <div class="grid grid-nogutter row-gap-3">
                <div class="col-12 md:col-6 md:pr-4 flex flex-column gap-2">
                    <label for="module" class="font-bold text-900">Module</label>
                    <p-dropdown id="module" [options]="moduleOptions" formControlName="module" 
                                placeholder="Select Module" styleClass="w-full"></p-dropdown>
                </div>
                <div class="col-12 md:col-6 flex flex-column gap-2">
                    <label for="severity" class="font-bold text-900">Severity</label>
                    <p-dropdown id="severity" [options]="severityOptions" formControlName="severity" 
                                placeholder="Select Severity" styleClass="w-full"></p-dropdown>
                </div>
            </div>

            <div class="flex flex-column gap-2">
                <label for="description" class="font-bold text-900">Description</label>
                <textarea pInputTextarea id="description" formControlName="description" 
                          rows="8" placeholder="Describe the incident in detail..." class="w-full"></textarea>
            </div>

            <div class="flex flex-column sm:flex-row justify-content-end gap-3 mt-4">
                <p-button 
                    label="Clear" 
                    icon="pi pi-refresh" 
                    severity="secondary" 
                    [text]="true" 
                    (click)="incidentForm.reset()" 
                    styleClass="w-full sm:w-auto">
                </p-button>
                
                <p-button 
                    label="Submit Incident" 
                    icon="pi pi-check" 
                    severity="success" 
                    type="submit" 
                    [loading]="loading"
                    styleClass="w-full sm:w-auto">
                </p-button>
            </div>
        </form>
    </p-card>
</div>
