<p-toast></p-toast>
<div class="flex justify-content-center p-4">
    <p-card header="Report New Incident" subheader="Enter the details of the quality deviation" [style]="{width: '600px'}">
        <form [formGroup]="incidentForm" (ngSubmit)="onSubmit()" class="flex flex-column gap-3">
            
            <div class="flex flex-column gap-2">
                <label for="title" class="font-bold">Incident Title</label>
                <input pInputText id="title" formControlName="title" placeholder="Brief summary of the issue" />
            </div>

            <div class="grid">
                <div class="col-6 flex flex-column gap-2">
                    <label for="module" class="font-bold">Module</label>
                    <p-dropdown id="module" [options]="moduleOptions" formControlName="module" placeholder="Select Module" styleClass="w-full"></p-dropdown>
                </div>
                <div class="col-6 flex flex-column gap-2">
                    <label for="severity" class="font-bold">Severity</label>
                    <p-dropdown id="severity" [options]="severityOptions" formControlName="severity" placeholder="Select Severity" styleClass="w-full"></p-dropdown>
                </div>
            </div>

            <div class="flex flex-column gap-2">
                <label for="description" class="font-bold">Description</label>
                <textarea pInputTextarea id="description" formControlName="description" rows="5" placeholder="Describe the incident in detail..."></textarea>
            </div>

            <div class="flex justify-content-end gap-2 mt-4">
                <p-button label="Clear" icon="pi pi-refresh" severity="secondary" (click)="incidentForm.reset()" [disabled]="loading"></p-button>
                <p-button label="Submit Incident" icon="pi pi-check" severity="success" type="submit" [loading]="loading"></p-button>
            </div>
        </form>
    </p-card>
</div>
